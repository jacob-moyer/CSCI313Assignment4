<h2 class="text-center mb-4">Dashboard</h2>
<div class="row g-3">
  <div class="col-md-6">
    <div class="card border-primary text-center p-3">
      <h5 class="card-title">Total Expenses</h5>
      <p class="card-text text-primary fs-4 fw-bold">
        {{ expenseService.totalExpenses() | currency }}
      </p>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card border-success text-center p-3">
      <h5 class="card-title">Number of Expenses</h5>
      <p class="card-text text-success fs-4 fw-bold">{{ expenseService.transactionCount() }}</p>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card border-success text-center p-3">
      <h5 class="card-title">Highest Expense</h5>
      <p class="card-text text-success fs-4 fw-bold">
        {{ expenseService.highestExpense() | currency }}
      </p>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card border-success text-center p-3">
      <h5 class="card-title">Average Expense</h5>
      <p class="card-text text-success fs-4 fw-bold">
        {{ expenseService.averageExpense() | currency }}
      </p>
    </div>
  </div>
</div>
