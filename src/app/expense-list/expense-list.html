<h2 class="mb-4 text-center">All Expenses</h2>
<div class="row justify-content-center">
  @if (expenseService.expenses().length === 0) {
    <p class="alert alert-info text-center">No expenses available. Please add a new expense.</p>
  } @else {
    <div class="row g-3">
      @for (expense of expenseService.expenses(); track expense.id) {
        <div class="col-md-6">
          <app-expense-item [expense]="expense" />
        </div>
      }
    </div>
  }
</div>
