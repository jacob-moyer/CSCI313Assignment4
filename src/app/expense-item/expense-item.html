<div class="card h-100 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
      <h5 class="mb-1">{{ expense.title }}</h5>
      <small class="fw-semibold" [style.background-color]="categoryColor">{{
        expense.category
      }}</small>
    </div>
    <p class="fs-5 fw-bold">
      {{ expense.amount | currency }}
    </p>
  </div>
  <div class="text-end">
    <button class="btn btn-sm btn-primary m-2">Edit</button>
    <button class="btn btn-sm btn-danger m-2" (click)="onDelete()">Delete</button>
  </div>
</div>
