<div
  class="card h-100 shadow-sm"
  [class.border-danger]="isHighExpense"
  [class.border-secondary]="!isHighExpense"
>
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="card-title mb-0">{{ expense.title }}</h5>
      <span class="badge" [style.background-color]="categoryColor">{{ expense.category }}</span>
    </div>
    <p
      class="fs-5 fw-bold"
      [class.text-danger]="isHighExpense"
      [class.text-secondary]="!isHighExpense"
    >
      {{ expense.amount | currency }}
    </p>
    @if (isHighExpense) {
      <span class="badge bg-danger mb-2">High Expense</span>
    }
  </div>
  <div class="card-footer d-flex gap-2">
    <button class="btn btn-sm btn-outline-primary" (click)="onDelete()">Delete</button>
  </div>
</div>
